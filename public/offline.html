<!DOCTYPE html>
<html lang="zh-Hant" data-theme="lofi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>離線中 — MyShipMall</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Noto Sans TC", system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        background: #fafafa;
        color: #1a1a1a;
        gap: 1rem;
        padding: 2rem;
        text-align: center;
      }
      .icon {
        font-size: 4rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 700;
      }
      p {
        color: #666;
        max-width: 320px;
        line-height: 1.6;
      }
      button {
        margin-top: 0.5rem;
        padding: 0.6rem 1.5rem;
        border: none;
        border-radius: 9999px;
        background: #1a1a1a;
        color: #fff;
        font-size: 0.9rem;
        cursor: pointer;
      }
      button:hover {
        background: #333;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #1a1a1a;
          color: #fafafa;
        }
        p {
          color: #aaa;
        }
        button {
          background: #fafafa;
          color: #1a1a1a;
        }
        button:hover {
          background: #ddd;
        }
      }
    </style>
  </head>
  <body>
    <div class="icon">📡</div>
    <h1>你目前離線中</h1>
    <p>無法連接到網路，請確認網路連線後再試。</p>
    <button onclick="window.location.reload()">重新嘗試</button>
  </body>
</html>
